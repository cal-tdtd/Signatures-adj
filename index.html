<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ADJ Email Signatures</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f2;
        color: #111;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 20px 64px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0 0 32px;
        line-height: 1.5;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 0 0 32px;
      }

      .links a {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 999px;
        background: #111;
        color: #fff;
        text-decoration: none;
        font-size: 14px;
      }

      .signature {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      }

      .signature h2 {
        margin: 0 0 16px;
        font-size: 18px;
      }

      .signature img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ADJ Email Signatures</h1>
      <p>This page hosts two signature HTML pages and preview images for publishing via GitHub Pages.</p>

      <div class="links">
        <a href="signature.html">Open Signature 1 HTML</a>
        <a href="signature-louis.html">Open Signature 2 HTML</a>
      </div>

      <section class="signature">
        <h2>Signature 1</h2>
        <img src="adj-signature-1.png" alt="ADJ email signature">
      </section>

      <section class="signature">
        <h2>Signature 2</h2>
        <img src="adj-signature-louis-1.png" alt="ADJ email signature for Louis">
      </section>
    </main>
  </body>
</html>
